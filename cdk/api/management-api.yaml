        connectionType: VPC_LINK
        requestParameters:
          integration.request.path.id: method.request.path.id
        uri: http://${loadBalancerDnsName}/management/v3/contractnegotiations/{id}
  /v3/contractnegotiations/{id}/agreement:
    get:
