openapi: 3.0.1
info:
  title: EDC API
  version: "1.0"
paths:
  /{connectorId}/check/health:
    get:
      description: Performs a liveness probe to determine whether the runtime is working properly.
      operationId: checkHealth
      parameters:
        - $ref: "#/components/parameters/ConnectorId"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
          description: The runtime is working properly.
      tags:
        - Application Observability
      x-amazon-apigateway-auth:
        type: AWS_IAM
      x-amazon-apigateway-integration:
        type: http_proxy
        httpMethod: ANY
        connectionId: ${vpcLinkId}
        connectionType: VPC_LINK
        uri: http://${loadBalancerDnsName}/{connectorId}/api/check/health
        integrationTarget: ${albArn}
        requestParameters:
          integration.request.path.connectorId: method.request.path.connectorId
  /{connectorId}/check/liveness:
    get:
      description: Performs a liveness probe to determine whether the runtime is working properly.
      operationId: getLiveness
      parameters:
        - $ref: "#/components/parameters/ConnectorId"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
          description: The runtime is working properly.
      tags:
        - Application Observability
      x-amazon-apigateway-auth:
        type: AWS_IAM
      x-amazon-apigateway-integration:
        type: http_proxy
        httpMethod: ANY
        connectionId: ${vpcLinkId}
        connectionType: VPC_LINK
        uri: http://${loadBalancerDnsName}/{connectorId}/api/check/liveness
        integrationTarget: ${albArn}
        requestParameters:
          integration.request.path.connectorId: method.request.path.connectorId
  /{connectorId}/check/readiness:
    get:
      description: Performs a readiness probe to determine whether the runtime is able to accept requests.
      operationId: getReadiness
      parameters:
        - $ref: "#/components/parameters/ConnectorId"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
          description: The runtime is able to accept requests.
      tags:
        - Application Observability
      x-amazon-apigateway-auth:
        type: AWS_IAM
      x-amazon-apigateway-integration:
        type: http_proxy
        httpMethod: ANY
        connectionId: ${vpcLinkId}
        connectionType: VPC_LINK
        uri: http://${loadBalancerDnsName}/{connectorId}/api/check/readiness
        integrationTarget: ${albArn}
        requestParameters:
          integration.request.path.connectorId: method.request.path.connectorId
  /{connectorId}/check/startup:
    get:
      description: Performs a startup probe to determine whether the runtime has completed startup.
      operationId: getStartup
      parameters:
        - $ref: "#/components/parameters/ConnectorId"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
          description: The runtime has completed startup.
      tags:
        - Application Observability
      x-amazon-apigateway-auth:
        type: AWS_IAM
      x-amazon-apigateway-integration:
        type: http_proxy
        httpMethod: ANY
        connectionId: ${vpcLinkId}
        connectionType: VPC_LINK
        uri: http://${loadBalancerDnsName}/{connectorId}/api/check/startup
        integrationTarget: ${albArn}
        requestParameters:
          integration.request.path.connectorId: method.request.path.connectorId
components:
  parameters:
    ConnectorId:
      name: connectorId
      in: path
      required: true
      schema:
        type: string
      description: Connector identifier for path-based routing
  schemas:
    Failure:
      type: object
      properties:
        failureDetail:
          type: string
        messages:
          type: array
          items:
            type: string
    HealthCheckResult:
      type: object
      properties:
        component:
          type: string
        failure:
          $ref: "#/components/schemas/Failure"
        isHealthy:
          type: boolean
    HealthStatus:
      type: object
      properties:
        componentResults:
          type: array
          items:
            $ref: "#/components/schemas/HealthCheckResult"
        isSystemHealthy:
          type: boolean
