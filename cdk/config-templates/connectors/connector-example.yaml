# Connector configuration for Dataspace Connector on AWS
# See: https://github.com/awslabs/dataspace-connector-on-aws
#
# Each connector requires its own identity credentials from the Cofinity-X Portal:
# https://portal.cofinity-x.com/connectorManagement
# Copy-paste the values from the portal's "Configure Your Connector" dialog.

connectorId: example
# profile: development           # Optional override (defaults to deployment.yaml profile)
controlPlaneCpu: 256
controlPlaneMemoryLimitMiB: 1024
dataPlaneCpu: 256
dataPlaneMemoryLimitMiB: 512
stateMachineIterationMillis: "10000"
edcStateRemovalPolicy: DESTROY # DESTROY or RETAIN

edcIam:
  trustedIssuer: ""
  stsOauthTokenUrl: ""
  stsOauthClientId: ""
  stsDimUrl: ""
  participantId: ""
  dcpId: ""
  didResolver: ""
